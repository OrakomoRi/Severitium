name: Auto Build and Release

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        run: |
          VERSION=$(jq -r .version package.json)
          if [ -z "$VERSION" ] || [ "$VERSION" == "null" ]; then
            echo "Version not found in package.json"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          semver_regex='^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$'
          if [[ "$VERSION" =~ $semver_regex ]]; then
            echo "IS_STABLE=true" >> $GITHUB_ENV
          else
            echo "IS_STABLE=false" >> $GITHUB_ENV
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Build JS
        run: |
          npx rollup -c
          mkdir -p /tmp/build-artifacts

          # Copy both bundles
          cp dist/loader.min.js /tmp/build-artifacts/loader.min.js
          cp dist/script.release.min.js /tmp/build-artifacts/script.release.min.js

      - name: Build CSS
        run: node scripts/build-css/build-css.cjs
        env:
          OUTPUT_DIR: /tmp/build-artifacts

      - name: Build variables
        run: node scripts/build-variables/build-variables.cjs
        env:
          OUTPUT_DIR: /tmp/build-artifacts
          VERSION: ${{ env.VERSION }}

      - name: Build icons
        run: node scripts/build-icons/build-icons.cjs
        env:
          OUTPUT_DIR: /tmp/build-artifacts

      - name: Publish to builds branch
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV
          STABLE_BASE=$(echo "$VERSION" | grep -oP '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)')
          echo "STABLE_BASE=$STABLE_BASE" >> $GITHUB_ENV
          COMMIT_DATE=$(git log -1 --format=%ad --date=short)
          COMMIT_MESSAGE=$(git log -1 --format=%B | sed '/^[[:space:]]*-/,$d' | tr '\n' ' ' | sed 's/  */ /g' | sed 's/^ *//;s/ *$//')

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin builds 2>/dev/null || true
          if git ls-remote --heads origin builds | grep -q builds; then
            git checkout builds
            git pull --rebase origin builds
          else
            git checkout --orphan builds
            git rm -rf . 2>/dev/null || true
          fi

          [ ! -f versions.json ] && echo '{"versions":[]}' > versions.json
          [ ! -f stable.json ]   && echo '{"versions":[]}' > stable.json

          if [ -z "$STABLE_BASE" ]; then
            echo "STABLE_BASE is empty, VERSION=$VERSION is not a valid semver"
            exit 1
          fi

          mkdir -p "versions/$STABLE_BASE/$VERSION"

          # Copy loader to builds root (always fresh, no version folder)
          cp /tmp/build-artifacts/loader.min.js "loader.min.js"

          # Copy modules bundle to versioned folder
          cp /tmp/build-artifacts/script.release.min.js "versions/$STABLE_BASE/$VERSION/"
          cp /tmp/build-artifacts/style.release.min.css "versions/$STABLE_BASE/$VERSION/"
          [ -f /tmp/build-artifacts/variables.css ]  && cp /tmp/build-artifacts/variables.css  "versions/$STABLE_BASE/$VERSION/"
          [ -f /tmp/build-artifacts/variables.min.css ] && cp /tmp/build-artifacts/variables.min.css "versions/$STABLE_BASE/$VERSION/"
          [ -f /tmp/build-artifacts/variables.json ] && cp /tmp/build-artifacts/variables.json "versions/$STABLE_BASE/$VERSION/"
          [ -f /tmp/build-artifacts/icons.release.css ]     && cp /tmp/build-artifacts/icons.release.css     "versions/$STABLE_BASE/$VERSION/"
          [ -f /tmp/build-artifacts/icons.release.min.css ] && cp /tmp/build-artifacts/icons.release.min.css "versions/$STABLE_BASE/$VERSION/"

          if ! grep -q "\"version\": \"$VERSION\"" versions.json; then
            /usr/bin/jq \
              --arg version "$VERSION" \
              --arg date    "$COMMIT_DATE" \
              --arg comment "$COMMIT_MESSAGE" \
              --arg hash    "$COMMIT_HASH" \
              '.versions += [{"version":$version,"date":$date,"comment":$comment,"hash":$hash}]' \
              versions.json > versions_tmp.json && mv versions_tmp.json versions.json
          fi

          if [ "$IS_STABLE" == "true" ] && ! grep -q "\"version\": \"$VERSION\"" stable.json; then
            /usr/bin/jq \
              --arg version "$VERSION" \
              --arg date    "$COMMIT_DATE" \
              --arg hash    "$COMMIT_HASH" \
              '.versions += [{"version":$version,"date":$date,"hash":$hash}]' \
              stable.json > stable_tmp.json && mv stable_tmp.json stable.json
          fi

          if [ ! -f vercel.json ]; then
            jq -n '{
              version: 2,
              public: true,
              headers: [
                {
                  source: "loader.min.js",
                  headers: [
                    { key: "Cache-Control", value: "public, max-age=0, must-revalidate" },
                    { key: "Access-Control-Allow-Origin", value: "*" }
                  ]
                },
                {
                  source: "stable.json",
                  headers: [
                    { key: "Cache-Control", value: "public, max-age=0, must-revalidate" },
                    { key: "Access-Control-Allow-Origin", value: "*" }
                  ]
                },
                {
                  source: "versions.json",
                  headers: [
                    { key: "Cache-Control", value: "public, max-age=0, must-revalidate" },
                    { key: "Access-Control-Allow-Origin", value: "*" }
                  ]
                },
                {
                  source: "versions/(.*)",
                  headers: [
                    { key: "Cache-Control", value: "public, max-age=300, must-revalidate" },
                    { key: "Access-Control-Allow-Origin", value: "*" }
                  ]
                }
              ]
            }' > vercel.json
          fi

          git add -A
          git commit -m "$VERSION" || echo "No changes for $VERSION"
          git push origin builds

      - name: Create GitHub release
        if: env.IS_STABLE == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body: |
            ## Severitium ${{ env.VERSION }}

            Stable release built automatically.

            **Download:**
            - [severitium.user.js](https://statically.io/gh/OrakomoRi/Severitium@${{ env.COMMIT_HASH }}/release/severitium.user.js)
            - [severitium.client.js](https://github.com/OrakomoRi/Severitium/releases/download/${{ env.VERSION }}/severitium.client.js)
            - [loader.min.js](https://severitium-builds-server.onrender.com/loader.min.js)
            - [script.release.min.js](https://severitium-builds-server.onrender.com/versions/${{ env.STABLE_BASE }}/${{ env.VERSION }}/script.release.min.js)
            - [style.release.min.css](https://severitium-builds-server.onrender.com/versions/${{ env.STABLE_BASE }}/${{ env.VERSION }}/style.release.min.css)
          files: |
            release/severitium.client.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}