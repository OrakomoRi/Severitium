<!DOCTYPE html>
<html class="GlobalStyle-html" lang="<?= $lang; ?>">
<head>
	<title></title>
	<meta charset="utf-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="style.css" rel="stylesheet" media="screen">
</head>
<body class="GlobalStyle-body">
<div class="commonBackground">
	<div class="loader"></div>

	<div id="dialog_ru" style="display:none">
		<h1>Ожидание подключения к Интернету…</h1>
	</div>
	<div id="dialog_en" style="display:none">
		<h1>Wait for internet connection…</h1>
	</div>
	<div id="dialog_de" style="display:none">
		<h1>Warte auf Internetverbindung…</h1>
	</div>
	<div id="dialog_pl" style="display:none">
		<h1>Oczekiwanie na połączenie internetowe…</h1>
	</div>
	<div id="dialog_fr" style="display:none">
		<h1>En attente de connexion internet…</h1>
	</div>
	<div id="dialog_zh" style="display:none">
		<h1>正在等待互联网连接…</h1>
	</div>
</div>

<script>
	const lang = window.navigator.language.substr(0, 2).toLowerCase()
	const div_map = new Map ([
		["ru",  "dialog_ru"],
		["en",  "dialog_en"],
		["de",  "dialog_de"],
		["pl",  "dialog_pl"],
		["fr",  "dialog_fr"],
		["zh",  "dialog_zh"],
	]);
	const div_id = div_map.get(lang) || "dialog_en"

	const updateOnlineStatus = () => {
		document.getElementById(div_id).style.display = navigator.onLine ? "none" : "flex";
	}
	window.addEventListener("online",  updateOnlineStatus)
	window.addEventListener("offline",  updateOnlineStatus)
	updateOnlineStatus()
</script>

</body>
</html>
